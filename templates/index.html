{% extends "base.html" %}
{% block content %}

<div class="row text-center mb-5">
    <div class="col-md-3 mb-3">
        <div class="card p-3 shadow-sm border-primary">
            <h6 class="text-muted">Total Invitaciones</h6>
            <h3 class="text-primary">{{ stats.total }}</h3>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card p-3 shadow-sm border-success">
            <h6 class="text-muted">Exitosas</h6>
            <h3 class="text-success">{{ stats.success }}</h3>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card p-3 shadow-sm border-danger">
            <h6 class="text-muted">Fallidas</h6>
            <h3 class="text-danger">{{ stats.failed }}</h3>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card p-3 shadow-sm border-warning">
            <h6 class="text-muted">Pagos SINPE</h6>
            <h3 class="text-warning">{{ stats.sinpe }}</h3>
        </div>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm p-4">
            <h3 class="mb-4 text-center">Enviar nueva invitación</h3>
            <form id="inviteForm">
                <div class="mb-3">
                    <label class="form-label">CUSTOMER NAME</label>
                    <input type="text" class="form-control" id="customer_name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">WHATSAPP NUMBER</label>
                    <input type="text" class="form-control" id="customer_phone" placeholder="+506XXXXXXXX" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">GOOGLE REVIEW LINK</label>
                    <input type="url" class="form-control" id="review_url" placeholder="https://..." required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="is_sinpe">
                    <label class="form-check-label">¿Fue pago por SINPE Móvil?</label>
                </div>
                <button type="submit" class="btn btn-success w-100">Send WhatsApp Invite</button>
            </form>
        </div>
    </div>
</div>

<script>
    // Tu lógica de envío permanece igual
    document.getElementById('inviteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            customer_name: document.getElementById('customer_name').value,
            customer_phone: document.getElementById('customer_phone').value,
            review_url: document.getElementById('review_url').value,
            is_sinpe: document.getElementById('is_sinpe').checked
        };
        
        const response = await fetch('/api/send-request', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            alert("¡Invitación enviada con éxito!");
            location.reload();
        } else {
            alert("Error al enviar la invitación");
        }
    });
</script>

{% endblock %}
