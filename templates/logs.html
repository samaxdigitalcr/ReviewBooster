{% extends "base.html" %}
{% block content %}
<div class="card p-4 shadow-sm">
    <h3 class="mb-4">Historial de Invitaciones</h3>

    <!-- Barra de búsqueda y filtros -->
    <div class="row mb-3">
        <div class="col-md-6">
            <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nombre...">
        </div>
        <div class="col-md-3">
            <select id="statusFilter" class="form-select">
                <option value="all">Todos los estados</option>
                <option value="Success">Exitosos</option>
                <option value="Failed">Fallidos</option>
            </select>
        </div>
    </div>

    <!-- Tabla -->
    <table class="table table-hover mt-3" id="logsTable">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Teléfono</th>
                <th>Estado</th>
                <th>SINPE</th>
            </tr>
        </thead>
        <tbody>
            {% for item in history %}
            <tr>
                <td>{{ item.customer_name }}</td>
                <td>{{ item.customer_phone }}</td>
                <td><span class="badge {{ 'bg-success' if item.status == 'Success' else 'bg-danger' }}">{{ item.status }}</span></td>
                <td>{{ 'Sí' if item.is_sinpe else 'No' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Script para el filtro (Búsqueda en tiempo real) -->
<script>
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let value = this.value.toLowerCase();
        document.querySelectorAll('#logsTable tbody tr').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(value) ? '' : 'none';
        });
    });
</script>
{% endblock %}
